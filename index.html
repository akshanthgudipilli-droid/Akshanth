<!DOCTYPE html>
<html>
<head>
  <title>Akshanth Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #000428, #004e92);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 30px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    img {
      width: 120px;
      border-radius: 50%;
      border: 3px solid white;
      margin-bottom: 15px;
    }

    h1 {
      margin: 10px 0;
      font-size: 24px;
    }

    p {
      font-size: 14px;
      color: #ddd;
    }

    .btn {
      display: block;
      margin-top: 15px;
      padding: 12px;
      border-radius: 25px;
      text-decoration: none;
      background: white;
      color: black;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00c6ff;
      color: white;
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="ICON8674.jpg" />

    <h1>Akshanth Naidu</h1>
    <p>Entrepreneur | Fitness</p>

    <p>I am interested in business, earning and self growth.</p>

    <a href="https://instagram.com/akshanth_naidu" class="btn">Instagram</a>
  </div>

</body>
</html>
