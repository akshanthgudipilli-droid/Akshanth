<!DOCTYPE html>
<html>
<head>
  <title>Akshanth Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    img {
      width: 130px;
      border-radius: 50%;
      border: 3px solid #00ffd5;
      box-shadow: 0 0 20px #00ffd5;
    }

    h1 {
      margin-top: 15px;
      font-size: 32px;
      color: #00ffd5;
    }

    p {
      margin: 10px 0;
      font-size: 16px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 15px rgba(0,255,213,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #00ffd5;
      color: black;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="https://via.placeholder.com/130" />

    <h1>Akshanth</h1>
    <p>💼 Future Entrepreneur | 💪 Fitness Lover</p>

    <div class="card">
      <h2>About Me</h2>
      <p>I am passionate about business, online earning and self growth.</p>
    </div>

    <div class="card">
      <h2>Skills</h2>
      <p>📈 Trading Basics <br> 💡 Business Ideas <br> 🗣 Communication</p>
    </div>

    <div class="card">
      <h2>Contact</h2>
      <p>📧 yourmail@gmail.com</p>
    </div>

    <a href="#" class="btn">Connect With Me</a>

  </div>

</body>
  </html>
